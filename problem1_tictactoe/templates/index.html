<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe AI</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            width: 100px;
            height: 100px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Tic Tac Toe AI</h1>

<div id="board"></div>

<script>
let board = ["","","","","","","","",""];

function makeMove(i){
    if(board[i] !== "") return;

    // Player move
    board[i] = "X";
    render();

    // Send to backend
    fetch("/move", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({board: board})
    })
    .then(res => res.json())
    .then(data => {

        // AI move
        if(data.move !== -1){
            board[data.move] = "O";
        }

        // SHOW COMPARISON (IMPORTANT STEP 10)
        alert(
            "Minimax Time: " + data.minimax_time +
            "\nAlpha-Beta Time: " + data.alphabeta_time
        );

        render();
    });
}

function render(){
    let html = "";
    for(let i=0;i<9;i++){
        html += `<button onclick="makeMove(${i})">${board[i]}</button>`;
    }
    document.getElementById("board").innerHTML = html;
}

// Initial render
render();
</script>

</body>
</html>
